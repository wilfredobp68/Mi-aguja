<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Aguja · Residencial</title>

    <!-- PWA: permite "instalar" la app desde el navegador del celular
         (Agregar a pantalla de inicio) con nuestro logo como icono y a
         pantalla completa, como una app de verdad. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1b4332" />
    <link rel="icon" type="image/png" href="/icono-192.png" />
    <!-- iPhone usa estas etiquetas propias para el icono y pantalla completa -->
    <link rel="apple-touch-icon" href="/icono-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Tipografías de Google Fonts: Playfair Display (títulos) + Inter (cuerpo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- React "monta" toda la app dentro de este div -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
